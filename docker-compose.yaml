services:
  app:
    container_name: sub-service
    build:
      context: .
      target: sub-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    env_file:
      - config/local.env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    
  migrate:
    container_name: sub-service-migrate
    build:
      context: .
      target: migrate
    command: ["-command", "up"]
    env_file:
      - config/local.env
    depends_on:
      db:
        condition: service_healthy
    
  db:
    image: postgres:15
    restart: always
    container_name: postgres
    ports:
      - "5433:5432"
    env_file:
      - config/local.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data: